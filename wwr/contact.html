<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Whitewater Rafting Adventures</title>
  <meta name="description" content="Contact Whitewater Rafting Adventures for questions, reservations, or suggestions. Reach us via phone, email, or the contact form." />
  <meta name="author" content="Whitewater Rafting Adventures Team" />
  <link rel="stylesheet" href="styles/rafting.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&display=swap" rel="stylesheet" />
</head>
<body>
  <header>
    <nav>
      <!-- Navigation items here -->
    </nav>
    <h1>Contact Whitewater Rafting Adventures</h1>
  </header>

  <main>
    <section class="contact-info">
      <h2>Contact Information</h2>
      <p>Phone: (555) 123-4567</p>
      <p>Email: info@whitewaterrrafting.com</p>
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.019813184217!2d-122.4194154846814!3d37.77492977975939!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085809c6a6e6a93%3A0xa754cdd5f3757ee!2sSan+Francisco%2C+CA!5e0!3m2!1sen!2sus!4v1616161616161" 
        allowfullscreen 
        loading="lazy"
        title="Whitewater Rafting Adventures Location"
      ></iframe>
    </section>

    <section class="employee-profiles">
      <h2>Meet Our Team</h2>
      <figure>
        <img src="images/employee1.jpg" alt="Jane Doe - Guide" />
        <figcaption>Jane Doe - Senior Guide</figcaption>
      </figure>
      <figure>
        <img src="images/employee2.jpg" alt="John Smith - Guide" />
        <figcaption>John Smith - Guide</figcaption>
      </figure>
      <!-- Add more profiles as needed -->
    </section>

    <section class="contact-form">
      <h2>Send Us a Message</h2>
      <form action="#" method="post" novalidate>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <fieldset>
          <legend>Preferred Contact Method:</legend>
          <label for="contact-phone">
            <input type="radio" id="contact-phone" name="contact-method" value="phone" required />
            Phone
          </label>
          <label for="contact-email">
            <input type="radio" id="contact-email" name="contact-method" value="email" />
            Email
          </label>
          <label for="contact-none">
            <input type="radio" id="contact-none" name="contact-method" value="none" />
            No preference
          </label>
        </fieldset>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <label>
          <input type="checkbox" id="subscribe" name="subscribe" />
          Subscribe to our newsletter
        </label>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© Whitewater Rafting Adventures | All rights reserved</p>
  </footer>
</body>
</html>
