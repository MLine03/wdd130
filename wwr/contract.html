<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact White Water Rafting" />
  <meta name="author" content="Your Name" />
  <title>White Water Rafting - Contact</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@700&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="styles/rafting.css" />
</head>
<body>
  <header>
    <img src="images/wwr-logo.png" alt="White Water Rafting Logo" />
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h1>Contact Us</h1>
    <section>
      <p>Email: info@whitewaterrafting.com</p>
      <p>Phone: (123) 456-7890</p>
      <p>Address: 123 River Run Road, Rapids City, CO</p>
    </section>

    <section>
      <h2>Send Us a Message</h2>
      <form>
        <label for="name">Name:</label><br />
        <input type="text" id="name" name="name" required /><br />

        <label for="email">Email:</label><br />
        <input type="email" id="email" name="email" required /><br />

        <label for="message">Message:</label><br />
        <textarea id="message" name="message" rows="5" required></textarea><br />

        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 White Water Rafting Adventures — Your Name</p>
    <nav class="socialmedia">
      <a href="https://facebook.com"><img src="images/facebook-icon.png" alt="Facebook icon" /></a>
      <a href="https://twitter.com"><img src="images/twitter-icon.png" alt="Twitter icon" /></a>
      <a href="https://instagram.com"><img src="images/instagram-icon.png" alt="Instagram icon" /></a>
    </nav>
  </footer>
</body>
</html>
